services:
  - type: web
    name: goalconsensus
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b

  - type: cron
    name: goalconsensus-keepalive
    runtime: node
    plan: free
    schedule: "*/10 * * * *"
    startCommand: node -e "const https=require('https');https.get('https://goalconsensus.onrender.com/api/matches',r=>{console.log('status:',r.statusCode)}).on('error',e=>console.error(e.message))"
    envVars:
      - key: NODE_ENV
        value: production
