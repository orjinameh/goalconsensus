services:
  - type: web
    name: goalconsensus
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/matches
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct

  - type: cron
    name: goalconsensus-keepalive
    runtime: node
    plan: free
    schedule: "*/10 * * * *"
    startCommand: node -e "const https=require('https');https.get('https://goalconsensus.onrender.com/api/matches',r=>{console.log('status:',r.statusCode)}).on('error',e=>console.error(e.message))"
    envVars:
      - key: NODE_ENV
        value: production
